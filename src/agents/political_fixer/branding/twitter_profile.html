<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Political Fixer — Twitter Profile Picture (400x400)</title>
    <style>
        body {
            margin: 0;
            background: #2a2520;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .canvas-label {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            letter-spacing: 0.15em;
            font-family: monospace;
        }
        .canvas-instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            letter-spacing: 0.1em;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="canvas-label">THE POLITICAL FIXER — PROFILE PICTURE — 400×400</div>

    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
        <defs>
            <!-- Aged paper background -->
            <linearGradient id="paperBg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f5f0e8"/>
                <stop offset="50%" stop-color="#ede6da"/>
                <stop offset="100%" stop-color="#e8e0d0"/>
            </linearGradient>

            <!-- Paper texture noise -->
            <filter id="paperNoise" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="5" stitchTiles="stitch" result="noise"/>
                <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
                <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
                <feComponentTransfer in="blend">
                    <feFuncA type="linear" slope="1"/>
                </feComponentTransfer>
            </filter>

            <!-- Heavy paper grain -->
            <filter id="grain" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" stitchTiles="stitch" result="noise"/>
                <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
                <feBlend in="SourceGraphic" in2="grey" mode="overlay"/>
            </filter>

            <!-- Vignette for aged paper look -->
            <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
                <stop offset="50%" stop-color="black" stop-opacity="0"/>
                <stop offset="95%" stop-color="black" stop-opacity="0.12"/>
                <stop offset="100%" stop-color="black" stop-opacity="0.2"/>
            </radialGradient>

            <!-- Subtle edge darkening -->
            <radialGradient id="ageing" cx="50%" cy="50%" r="60%">
                <stop offset="40%" stop-color="#e8e0d0" stop-opacity="0"/>
                <stop offset="100%" stop-color="#c4b8a0" stop-opacity="0.3"/>
            </radialGradient>

            <!-- Red stamp color -->
            <linearGradient id="stampRed" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b0000"/>
                <stop offset="100%" stop-color="#6b0000"/>
            </linearGradient>
        </defs>

        <!-- Paper background -->
        <rect width="400" height="400" fill="url(#paperBg)"/>

        <!-- Paper grain texture -->
        <rect width="400" height="400" fill="url(#paperBg)" filter="url(#grain)" opacity="0.08"/>

        <!-- Faint grid lines like graph paper -->
        <g opacity="0.06" stroke="#666666" stroke-width="0.5">
            <line x1="0" y1="40" x2="400" y2="40"/>
            <line x1="0" y1="80" x2="400" y2="80"/>
            <line x1="0" y1="120" x2="400" y2="120"/>
            <line x1="0" y1="160" x2="400" y2="160"/>
            <line x1="0" y1="200" x2="400" y2="200"/>
            <line x1="0" y1="240" x2="400" y2="240"/>
            <line x1="0" y1="280" x2="400" y2="280"/>
            <line x1="0" y1="320" x2="400" y2="320"/>
            <line x1="0" y1="360" x2="400" y2="360"/>
            <line x1="40" y1="0" x2="40" y2="400"/>
            <line x1="80" y1="0" x2="80" y2="400"/>
            <line x1="120" y1="0" x2="120" y2="400"/>
            <line x1="160" y1="0" x2="160" y2="400"/>
            <line x1="200" y1="0" x2="200" y2="400"/>
            <line x1="240" y1="0" x2="240" y2="400"/>
            <line x1="280" y1="0" x2="280" y2="400"/>
            <line x1="320" y1="0" x2="320" y2="400"/>
            <line x1="360" y1="0" x2="360" y2="400"/>
        </g>

        <!-- Chess Knight - stark geometric silhouette -->
        <g transform="translate(120, 70)">
            <!-- Knight silhouette - architectural, slightly menacing -->
            <path d="
                M 80 260
                L 80 240
                C 80 235, 70 225, 68 215
                L 68 200
                C 66 190, 72 180, 75 170
                L 78 155
                C 80 145, 82 135, 85 125
                C 88 110, 92 100, 95 85
                C 97 75, 100 65, 100 55
                C 100 45, 98 35, 92 28
                C 86 20, 78 15, 68 12
                C 58 8, 48 10, 40 15
                C 32 20, 28 28, 25 38
                L 22 50
                C 20 58, 18 62, 15 65
                L 8 72
                C 4 76, 2 80, 5 82
                C 8 84, 12 82, 18 78
                L 30 68
                C 28 80, 30 90, 32 100
                C 34 112, 38 120, 42 130
                C 45 140, 48 148, 50 158
                C 52 168, 50 178, 48 188
                C 46 198, 44 208, 44 218
                C 44 228, 48 238, 50 245
                L 50 260
                Z
            " fill="#1a1a1a" opacity="0.88"/>

            <!-- Knight eye (negative space) -->
            <circle cx="58" cy="38" r="4" fill="url(#paperBg)"/>

            <!-- Ear detail -->
            <path d="M 70 18 C 72 10, 78 8, 82 12" fill="none" stroke="#333" stroke-width="1.5" opacity="0.4"/>

            <!-- Base/pedestal -->
            <rect x="35" y="258" width="60" height="12" rx="2" fill="#1a1a1a" opacity="0.85"/>
        </g>

        <!-- CLASSIFIED stamp - partially visible, angled, reduced opacity -->
        <g transform="translate(200, 320) rotate(-18)" opacity="0.12">
            <rect x="-95" y="-22" width="190" height="44" rx="4" fill="none" stroke="#8b0000" stroke-width="3"/>
            <text x="0" y="10" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#8b0000" letter-spacing="0.15em">CLASSIFIED</text>
        </g>

        <!-- Paper edge darkening / ageing -->
        <rect width="400" height="400" fill="url(#ageing)"/>

        <!-- Paper noise texture -->
        <rect width="400" height="400" filter="url(#paperNoise)" opacity="0.06"/>

        <!-- Vignette -->
        <rect width="400" height="400" fill="url(#vignette)"/>
    </svg>

    <div class="canvas-instructions">Right-click → Save Image As... or screenshot at 400×400</div>
</body>
</html>
