<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="goldFade3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#d4af37;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#d4af37;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Pure black background -->
  <rect width="1500" height="500" fill="#030303"/>

  <!-- Horizontal gold line through center -->
  <rect x="0" y="248" width="1500" height="4" fill="url(#goldFade3)"/>

  <!-- Left side - stacked suits fading out -->
  <g transform="translate(100, 250)" opacity="0.15">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9824;</text>
  </g>
  <g transform="translate(200, 250)" opacity="0.25">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9829;</text>
  </g>
  <g transform="translate(300, 250)" opacity="0.35">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9830;</text>
  </g>
  <g transform="translate(400, 250)" opacity="0.45">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9827;</text>
  </g>

  <!-- Right side - stacked suits fading out (mirrored) -->
  <g transform="translate(1400, 250)" opacity="0.15">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9824;</text>
  </g>
  <g transform="translate(1300, 250)" opacity="0.25">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9829;</text>
  </g>
  <g transform="translate(1200, 250)" opacity="0.35">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9830;</text>
  </g>
  <g transform="translate(1100, 250)" opacity="0.45">
    <text font-family="serif" font-size="60" fill="#d4af37" text-anchor="middle" y="20">&#9827;</text>
  </g>

  <!-- Center lockup -->
  <g transform="translate(750, 250)">
    <!-- BLACKJACK -->
    <text x="0" y="-25"
          font-family="Cinzel, Georgia, serif"
          font-size="80"
          font-weight="700"
          letter-spacing="0.25em"
          fill="#f5f0e1"
          text-anchor="middle">BLACKJACK</text>

    <!-- GOD -->
    <text x="0" y="70"
          font-family="Cinzel, Georgia, serif"
          font-size="56"
          font-weight="800"
          letter-spacing="0.6em"
          fill="#d4af37"
          text-anchor="middle"
          style="filter: drop-shadow(0 0 30px rgba(212,175,55,0.4))">GOD</text>
  </g>
</svg>
