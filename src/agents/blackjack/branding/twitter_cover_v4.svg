<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="cardShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="goldLine4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d4af37;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#d4af37;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#cardShine)"/>

  <!-- Two card silhouettes overlapping - the winning hand -->
  <g transform="translate(300, 250)">
    <!-- Card 1 - Ace -->
    <g transform="rotate(-8)">
      <rect x="-70" y="-100" width="140" height="200" rx="10" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.4"/>
      <text x="0" y="25" font-family="Cinzel, Georgia, serif" font-size="80" font-weight="700" fill="#d4af37" text-anchor="middle" opacity="0.5">A</text>
    </g>
    <!-- Card 2 - 10/Face -->
    <g transform="translate(80, 0) rotate(8)">
      <rect x="-70" y="-100" width="140" height="200" rx="10" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.4"/>
      <text x="0" y="30" font-family="Cinzel, Georgia, serif" font-size="65" font-weight="700" fill="#d4af37" text-anchor="middle" opacity="0.5">K</text>
    </g>
  </g>

  <!-- 21 badge on the cards -->
  <g transform="translate(340, 180)">
    <circle r="35" fill="#d4af37" opacity="0.9"/>
    <text x="0" y="12" font-family="Cinzel, Georgia, serif" font-size="32" font-weight="900" fill="#050505" text-anchor="middle">21</text>
  </g>

  <!-- Center-right brand -->
  <g transform="translate(950, 250)">
    <!-- Spade mark -->
    <g transform="translate(-150, 0)">
      <path d="M0 -40 C0 -40 -40 0 -40 25 C-40 45 -22 55 -8 48 C-15 65 -25 78 -25 78 L25 78 C25 78 15 65 8 48 C22 55 40 45 40 25 C40 0 0 -40 0 -40 Z"
            fill="#d4af37"
            style="filter: drop-shadow(0 0 25px rgba(212,175,55,0.3))"/>
    </g>

    <!-- Text stack -->
    <g transform="translate(80, 0)">
      <text x="0" y="-20"
            font-family="Cinzel, Georgia, serif"
            font-size="64"
            font-weight="700"
            letter-spacing="0.15em"
            fill="#f5f0e1"
            text-anchor="start">BLACKJACK</text>
      <text x="0" y="55"
            font-family="Cinzel, Georgia, serif"
            font-size="48"
            font-weight="600"
            letter-spacing="0.4em"
            fill="#d4af37"
            text-anchor="start">GOD</text>
    </g>
  </g>

  <!-- Subtle bottom line -->
  <rect x="200" y="450" width="1100" height="1" fill="url(#goldLine4)" opacity="0.5"/>
</svg>
