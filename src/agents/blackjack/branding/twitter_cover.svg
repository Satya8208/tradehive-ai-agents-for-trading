<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="edgeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#d4af37;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#d4af37;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="subtleGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f12;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#050505"/>

  <!-- Subtle felt gradient overlay -->
  <rect width="1500" height="500" fill="url(#subtleGlow)"/>

  <!-- Decorative corner lines -->
  <path d="M50 50 L50 100 M50 50 L100 50" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <path d="M1450 50 L1450 100 M1450 50 L1400 50" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <path d="M50 450 L50 400 M50 450 L100 450" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <path d="M1450 450 L1450 400 M1450 450 L1400 450" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

  <!-- Center content group -->
  <g transform="translate(750, 220)">
    <!-- Spade icon -->
    <g transform="translate(0, -80)">
      <path d="M0 -50 C0 -50 -45 0 -45 30 C-45 55 -25 65 -10 58 C-18 75 -28 85 -28 85 L28 85 C28 85 18 75 10 58 C25 65 45 55 45 30 C45 0 0 -50 0 -50 Z"
            fill="#d4af37"
            style="filter: drop-shadow(0 0 40px rgba(212,175,55,0.3))"/>
    </g>

    <!-- BLACKJACK text -->
    <text x="0" y="95"
          font-family="Cinzel, Georgia, serif"
          font-size="72"
          font-weight="800"
          letter-spacing="0.35em"
          fill="#f5f0e1"
          text-anchor="middle">BLACKJACK</text>

    <!-- GOD text -->
    <text x="0" y="165"
          font-family="Cinzel, Georgia, serif"
          font-size="42"
          font-weight="600"
          letter-spacing="0.8em"
          fill="#d4af37"
          text-anchor="middle">GOD</text>

    <!-- The Edge line -->
    <rect x="-280" y="185" width="560" height="2" fill="url(#edgeLine)"/>
  </g>

  <!-- Subtle spade watermarks on sides -->
  <g transform="translate(150, 250)" opacity="0.03">
    <path d="M0 -80 C0 -80 -70 0 -70 50 C-70 90 -40 105 -15 95 C-28 120 -42 135 -42 135 L42 135 C42 135 28 120 15 95 C40 105 70 90 70 50 C70 0 0 -80 0 -80 Z" fill="#d4af37"/>
  </g>
  <g transform="translate(1350, 250)" opacity="0.03">
    <path d="M0 -80 C0 -80 -70 0 -70 50 C-70 90 -40 105 -15 95 C-28 120 -42 135 -42 135 L42 135 C42 135 28 120 15 95 C40 105 70 90 70 50 C70 0 0 -80 0 -80 Z" fill="#d4af37"/>
  </g>
</svg>
