<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Dashboard | Advisor + Pro Trainer</title>
    <style>
        :root {
            --bg: #08130d;
            --bg-elevated: rgba(16, 34, 22, 0.92);
            --bg-muted: rgba(255, 255, 255, 0.04);
            --border: rgba(212, 175, 55, 0.18);
            --border-strong: rgba(212, 175, 55, 0.34);
            --text: #f5f1df;
            --text-dim: #a8b19d;
            --gold: #d4af37;
            --gold-soft: rgba(212, 175, 55, 0.12);
            --emerald: #23c17d;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(212, 175, 55, 0.12), transparent 30%),
                radial-gradient(circle at top right, rgba(35, 193, 125, 0.1), transparent 28%),
                linear-gradient(180deg, #0a1710 0%, #07110b 100%);
        }

        .shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 18px;
            gap: 16px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 18px;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            border-radius: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .brand {
            min-width: 0;
        }

        .brand-kicker {
            margin: 0 0 4px;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .brand-title {
            margin: 0;
            font-size: 28px;
            line-height: 1.05;
        }

        .brand-copy {
            margin: 6px 0 0;
            color: var(--text-dim);
            font-size: 14px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .mode-group {
            display: inline-flex;
            padding: 6px;
            border-radius: 999px;
            background: var(--bg-muted);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .mode-button {
            border: 0;
            cursor: pointer;
            color: var(--text-dim);
            background: transparent;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: 180ms ease;
        }

        .mode-button:hover {
            color: var(--text);
        }

        .mode-button.active {
            color: #101308;
            background: linear-gradient(135deg, #f0d780 0%, var(--gold) 100%);
            box-shadow: 0 10px 26px rgba(212, 175, 55, 0.3);
        }

        .open-link {
            color: var(--text);
            text-decoration: none;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--gold-soft);
            font-size: 13px;
            font-weight: 700;
        }

        .open-link:hover {
            border-color: var(--border-strong);
        }

        .workspace {
            flex: 1;
            min-height: 0;
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.18);
            box-shadow: var(--shadow);
        }

        .panel {
            width: 100%;
            height: calc(100vh - 154px);
            min-height: 640px;
            border: 0;
            display: none;
            background: #07110b;
        }

        .panel.active {
            display: block;
        }

        .statusbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 8px;
            color: var(--text-dim);
            font-size: 12px;
        }

        .status-note strong {
            color: var(--text);
        }

        @media (max-width: 900px) {
            .shell {
                padding: 12px;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: space-between;
            }

            .mode-group {
                width: 100%;
            }

            .mode-button {
                flex: 1;
                text-align: center;
            }

            .open-link {
                flex: 1;
                text-align: center;
            }

            .panel {
                height: calc(100vh - 248px);
                min-height: 560px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <p class="brand-kicker">TradeHive Blackjack</p>
                <h1 class="brand-title">Live Advisor + Pro Trainer</h1>
                <p class="brand-copy">Switch between live-table decision support and full casino-readiness training without leaving the dashboard.</p>
            </div>

            <div class="controls">
                <div class="mode-group" role="tablist" aria-label="Dashboard mode">
                    <button class="mode-button" id="mode-advisor" data-mode="advisor" type="button" role="tab" aria-controls="panel-advisor" aria-selected="false">
                        Advisor Mode
                    </button>
                    <button class="mode-button" id="mode-trainer" data-mode="trainer" type="button" role="tab" aria-controls="panel-trainer" aria-selected="false">
                        Pro Trainer
                    </button>
                </div>

                <a class="open-link" id="open-current-view" href="/advisor-app" target="_blank" rel="noopener noreferrer">
                    Open Current View
                </a>
            </div>
        </header>

        <section class="workspace">
            <iframe
                id="panel-advisor"
                class="panel"
                title="Blackjack Advisor"
                src="/advisor-app"></iframe>
            <iframe
                id="panel-trainer"
                class="panel"
                title="Blackjack Pro Trainer"
                src="/trainer-app"></iframe>
        </section>

        <footer class="statusbar">
            <div class="status-note">
                <strong>Advisor</strong> stays optimized for live hands.
                <strong>Pro Trainer</strong> keeps the full drill, planning, and readiness workflow.
            </div>
            <div id="current-path"></div>
        </footer>
    </div>

    <script>
        const MODE_KEY = 'blackjack-dashboard-shell-mode';
        const MODE_CONFIG = {
            advisor: {
                path: '/',
                link: '/advisor-app',
                title: 'Blackjack Dashboard | Advisor + Pro Trainer',
            },
            trainer: {
                path: '/pro-trainer',
                link: '/trainer-app',
                title: 'Blackjack Pro Trainer | Integrated Dashboard',
            },
        };

        const elements = {
            advisorButton: document.getElementById('mode-advisor'),
            trainerButton: document.getElementById('mode-trainer'),
            advisorPanel: document.getElementById('panel-advisor'),
            trainerPanel: document.getElementById('panel-trainer'),
            openLink: document.getElementById('open-current-view'),
            currentPath: document.getElementById('current-path'),
        };

        function routeMode() {
            return window.location.pathname === '/pro-trainer' ? 'trainer' : 'advisor';
        }

        function focusPanel(panel) {
            try {
                panel.contentWindow.focus();
            } catch {}
            panel.focus();
        }

        function updateMode(mode, pushHistory = true) {
            const config = MODE_CONFIG[mode] || MODE_CONFIG.advisor;
            const isTrainer = mode === 'trainer';

            elements.advisorButton.classList.toggle('active', !isTrainer);
            elements.trainerButton.classList.toggle('active', isTrainer);
            elements.advisorButton.setAttribute('aria-selected', String(!isTrainer));
            elements.trainerButton.setAttribute('aria-selected', String(isTrainer));
            elements.advisorPanel.classList.toggle('active', !isTrainer);
            elements.trainerPanel.classList.toggle('active', isTrainer);
            elements.openLink.href = config.link;
            document.title = config.title;
            elements.currentPath.textContent = config.path;

            try {
                localStorage.setItem(MODE_KEY, mode);
            } catch {}

            if (pushHistory && window.location.pathname !== config.path) {
                window.history.pushState({ mode }, '', config.path);
            }

            const panel = isTrainer ? elements.trainerPanel : elements.advisorPanel;
            window.setTimeout(() => focusPanel(panel), 0);
        }

        function initialMode() {
            return routeMode();
        }

        elements.advisorButton.addEventListener('click', () => updateMode('advisor'));
        elements.trainerButton.addEventListener('click', () => updateMode('trainer'));
        elements.advisorPanel.addEventListener('load', () => {
            if (elements.advisorPanel.classList.contains('active')) {
                focusPanel(elements.advisorPanel);
            }
        });
        elements.trainerPanel.addEventListener('load', () => {
            if (elements.trainerPanel.classList.contains('active')) {
                focusPanel(elements.trainerPanel);
            }
        });

        window.addEventListener('popstate', () => {
            updateMode(routeMode(), false);
        });

        updateMode(initialMode(), false);
    </script>
</body>
</html>
