<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blackjack God</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #050505;
            --surface: #0f0f0f;
            --surface-elevated: #1a1a1a;
            --gold: #d4a853;
            --gold-dim: #a68a3f;
            --gold-glow: rgba(212, 168, 83, 0.3);
            --text-primary: #f5f5f0;
            --text-secondary: #888;
            --text-dim: #555;
            --positive: #22c55e;
            --negative: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--void);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(26, 61, 36, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(212, 168, 83, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: linear-gradient(180deg, var(--surface) 0%, rgba(15, 15, 15, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.5), transparent);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 32px var(--gold-glow);
            margin-bottom: 16px;
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .logo-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--surface-elevated);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--gold);
            color: var(--void);
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface-elevated);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .field input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.05);
        }

        .field input::placeholder {
            color: var(--text-dim);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--void);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--gold-glow);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-btn {
            width: 100%;
            padding: 14px;
            background: var(--surface-elevated);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .social-btn:hover {
            border-color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--negative);
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--positive);
            display: none;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--gold);
        }

        .demo-mode {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .demo-btn {
            color: var(--text-secondary);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .demo-btn:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">♠</div>
                <div class="logo-text">BLACKJACK GOD</div>
                <div class="logo-subtitle">Beat the house with math</div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="login">Sign In</button>
                <button class="tab" data-tab="signup">Create Account</button>
            </div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <!-- Login Form -->
            <form id="login-form" class="form active">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
                <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="form">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)" required minlength="6">
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <button class="social-btn" id="google-login">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

            <div class="demo-mode">
                <a href="/" class="demo-btn">Skip for now → Try Demo Mode</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase - these will be replaced with actual values
        const SUPABASE_URL = window.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '';

        let supabase = null;
        if (SUPABASE_URL && SUPABASE_ANON_KEY) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // Parse redirect params from URL
        const urlParams = new URLSearchParams(window.location.search);
        const redirectTo = urlParams.get('redirect') || '/';
        const selectedTier = urlParams.get('tier');

        function getRedirectUrl() {
            let url = redirectTo.startsWith('/') ? redirectTo : '/' + redirectTo;
            if (selectedTier) {
                url += (url.includes('?') ? '&' : '?') + 'tier=' + selectedTier;
            }
            return url;
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));

                tab.classList.add('active');
                const formId = tab.dataset.tab + '-form';
                document.getElementById(formId).classList.add('active');

                hideMessages();
            });
        });

        function showError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.style.display = 'block';
            document.getElementById('success-message').style.display = 'none';
        }

        function showSuccess(message) {
            const el = document.getElementById('success-message');
            el.textContent = message;
            el.style.display = 'block';
            document.getElementById('error-message').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        // Login form
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!supabase) {
                // Demo mode - redirect to intended destination
                window.location.href = getRedirectUrl();
                return;
            }

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = e.target.querySelector('.submit-btn');

            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Store access token for API calls
                if (data.session) {
                    localStorage.setItem('sb-access-token', data.session.access_token);
                }

                // Redirect to intended destination
                showSuccess('Signed in! Redirecting...');
                setTimeout(() => {
                    window.location.href = getRedirectUrl();
                }, 500);

            } catch (error) {
                showError(error.message || 'Failed to sign in');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        // Signup form
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!supabase) {
                showError('Sign up is not available in demo mode');
                return;
            }

            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const btn = e.target.querySelector('.submit-btn');

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (error) throw error;

                showSuccess('Check your email to confirm your account!');
                btn.disabled = false;
                btn.textContent = 'Create Account';

            } catch (error) {
                showError(error.message || 'Failed to create account');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        // Google login
        document.getElementById('google-login').addEventListener('click', async () => {
            if (!supabase) {
                window.location.href = getRedirectUrl();
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + getRedirectUrl()
                    }
                });

                if (error) throw error;

            } catch (error) {
                showError(error.message || 'Failed to sign in with Google');
            }
        });

        // Forgot password
        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();

            if (!supabase) {
                showError('Password reset is not available in demo mode');
                return;
            }

            const email = document.getElementById('login-email').value;
            if (!email) {
                showError('Please enter your email first');
                return;
            }

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/auth'
                });

                if (error) throw error;

                showSuccess('Password reset email sent!');

            } catch (error) {
                showError(error.message || 'Failed to send reset email');
            }
        });

        // Check if already logged in
        if (supabase) {
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    // Store token and redirect to intended destination
                    localStorage.setItem('sb-access-token', session.access_token);
                    window.location.href = getRedirectUrl();
                }
            });
        }
    </script>
</body>
</html>
